worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    ssl_certificate     /etc/ssl/certs/op-nginx.crt;
    ssl_certificate_key /etc/ssl/private/op-nginx.key;

    # The OIDC auth-code flow is synchronous on the browser side; the
    # conformance suite's headless browser follows the redirect from
    # /authorize back to its own callback. Give nginx plenty of headroom.
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    resolver 127.0.0.11 ipv6=off valid=30s;

    server {
        listen 443 ssl;
        server_name op-nginx;

        # The whole point of openid-tls-connector is that a reverse proxy
        # terminates mTLS and injects the client certificate subject DN as
        # a header. In the integration tests we don't actually do mTLS —
        # we just hard-code the header to a fixed test DN. This makes the
        # provider's "auto-login" path exercise end-to-end: every request
        # to /authorize is treated as if an mTLS user named `test-user`
        # had presented a valid client certificate.
        location / {
            proxy_pass http://openid-provider:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Uri $request_uri;

            # Inject the fixed mTLS client cert subject DN. This is the
            # header value the OIDC provider parses to derive its `sub`.
            proxy_set_header X-Client-Cert-Subject "CN=test-user,OU=eng,O=acme";

            proxy_pass_request_headers on;
        }
    }
}
