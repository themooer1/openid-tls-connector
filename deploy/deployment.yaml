apiVersion: apps/v1
kind: Deployment
metadata:
  name: openid-tls-connector
  namespace: openid-tls-connector
  labels:
    app.kubernetes.io/name: openid-tls-connector
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openid-tls-connector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openid-tls-connector
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: ghcr.io/example/openid-tls-connector:latest
          imagePullPolicy: IfNotPresent
          args:
            - "/app/secrets/config.toml"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "info"
          volumeMounts:
            - name: secrets
              mountPath: /app/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /.well-known/openid-configuration
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /.well-known/openid-configuration
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: secrets
          secret:
            secretName: openid-tls-connector-secrets
            items:
              - key: config.toml
                path: config.toml
              - key: signing_key.pem
                path: signing_key.pem
            defaultMode: 0o400
        # Writable /tmp for the distroless image (readOnlyRootFilesystem).
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: openid-tls-connector
                topologyKey: kubernetes.io/hostname
