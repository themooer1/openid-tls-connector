# Secrets for the openid-tls-connector.
#
# This manifest contains PLACEHOLDER values. Do NOT apply it directly with
# real secrets — use kubectl create secret instead (see deploy/README.md).
#
# The Secret is mounted into the pod at /app/secrets/ and provides:
#   - config.toml:      the full server configuration (contains HMAC key)
#   - signing_key.pem:  RSA private key for RS256 JWT signing
#
# Create from local files:
#   kubectl create secret generic openid-tls-connector-secrets \
#     --namespace=openid-tls-connector \
#     --from-file=config.toml=./config.toml \
#     --from-file=signing_key.pem=./signing_key.pem
#
# Or apply this manifest with real base64-encoded values (not recommended
# for production — use kubectl create secret to avoid committing secrets).
apiVersion: v1
kind: Secret
metadata:
  name: openid-tls-connector-secrets
  namespace: openid-tls-connector
  labels:
    app.kubernetes.io/name: openid-tls-connector
type: Opaque
stringData:
  config.toml: |
    issuer = "https://auth.example.com"
    listen_addr = "0.0.0.0:8080"
    code_max_age_seconds = 300
    code_hmac_key = "REPLACE_WITH_64_HEX_CHARS"
    user_header = "X-Client-Cert-Subject"
    dn_attribute = "CN"
    id_token_ttl_seconds = 3600
    access_token_ttl_seconds = 3600
    signing_key_path = "/app/secrets/signing_key.pem"
    default_groups = ["everyone", "authenticated"]

    [[clients]]
    client_id = "spa"
    redirect_uris = ["https://app.example.com/cb"]
    groups = ["spa-users", "reporting-viewers"]

    [[clients]]
    client_id = "backend"
    client_secret = "REPLACE_WITH_A_REAL_SECRET"
    redirect_uris = ["https://api.example.com/callback"]
    groups = ["api-callers"]

  signing_key.pem: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_YOUR_RSA_PRIVATE_KEY
    -----END PRIVATE KEY-----
